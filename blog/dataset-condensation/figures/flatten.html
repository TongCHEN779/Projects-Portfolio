<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flatten to uniform</title>
<style>
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#fff;color:#222;overflow:hidden}
  #wrap{display:flex;flex-direction:column}
  canvas{display:block;width:100%;height:360px}
  #panel{flex:0 0 auto;padding:10px 16px;border-top:1px solid #eee;font-size:13px}
  .row{display:flex;align-items:center;gap:10px}
  .row label{min-width:210px;color:#444}
  input[type=range]{flex:1}
  .val{font-family:monospace;color:#c0392b;min-width:34px;text-align:right}
  #cap{margin-top:6px;color:#555}
  button{font:inherit;padding:3px 10px;border:1px solid #bbb;border-radius:5px;background:#f7f7f7;cursor:pointer}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="panel">
    <div class="row"><label>Transform: data &rarr; uniform</label><input id="t" type="range" min="0" max="1" step="0.01" value="0"><span class="val" id="tv">0.00</span><button id="play">Play</button></div>
    <div id="cap">Applying the CDF <em>F</em> to samples of a Gaussian mixture pushes the bimodal density (left) to a flat, uniform one (right). The gray curve is the mixture pdf; the black curve is its CDF.</div>
  </div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const tEl=document.getElementById('t'),tv=document.getElementById('tv'),playBtn=document.getElementById('play');
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const rng=mulberry32(3);
function randn(){let u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function erf(x){const s=x<0?-1:1;x=Math.abs(x);const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;const t=1/(1+p*x);const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);return s*y;}
function Phi(z){return 0.5*(1+erf(z/Math.SQRT2));}
const w1=0.6,m1=-1.3,s1=0.6,w2=0.4,m2=1.4,s2=0.9;
function pdf(x){return w1*Math.exp(-0.5*((x-m1)/s1)**2)/(s1*Math.sqrt(2*Math.PI))+w2*Math.exp(-0.5*((x-m2)/s2)**2)/(s2*Math.sqrt(2*Math.PI));}
function cdf(x){return w1*Phi((x-m1)/s1)+w2*Phi((x-m2)/s2);}
const xmin=-4,xmax=4;
// samples
const M=240,samp=[];
for(let i=0;i<M;i++){let x;if(rng()<w1)x=m1+s1*randn();else x=m2+s2*randn();samp.push(x);}
// each sample: data-x and uniform-x (F(x) rescaled to domain)
const su=samp.map(x=>({x, ux:xmin+cdf(x)*(xmax-xmin)}));

let W,H,padL,padR,baseY,topY;
function fit(){const b=cv.getBoundingClientRect();cv.width=b.width;cv.height=b.height;W=cv.width;H=cv.height;padL=40;padR=20;baseY=H-70;topY=30;}
function X(x){return padL+(x-xmin)/(xmax-xmin)*(W-padL-padR);}
function draw(){
  const t=parseFloat(tEl.value);tv.textContent=t.toFixed(2);
  ctx.clearRect(0,0,W,H);
  // histogram of current positions
  const NB=34,bins=new Array(NB).fill(0);
  for(const s of su){const pos=(1-t)*s.x+t*s.ux;let bi=Math.floor((pos-xmin)/(xmax-xmin)*NB);bi=Math.max(0,Math.min(NB-1,bi));bins[bi]++;}
  const bmax=Math.max(...bins);
  const bw=(W-padL-padR)/NB;
  for(let i=0;i<NB;i++){const h=(bins[i]/bmax)*(baseY-topY-10);ctx.fillStyle="rgba(52,152,219,0.25)";ctx.fillRect(padL+i*bw,baseY-h,bw-1,h);}
  // pdf curve (data space) fades out; flat line fades in
  ctx.lineWidth=2;
  ctx.strokeStyle=`rgba(120,120,120,${1-t})`;
  ctx.beginPath();let pmax=0;for(let x=xmin;x<=xmax;x+=0.02)pmax=Math.max(pmax,pdf(x));
  for(let x=xmin,first=true;x<=xmax;x+=0.02){const y=baseY-(pdf(x)/pmax)*(baseY-topY-10);const px=X(x);if(first){ctx.moveTo(px,y);first=false;}else ctx.lineTo(px,y);}
  ctx.stroke();
  // flat target line
  const flatY=baseY-(1/NB* M/bmax)*(baseY-topY-10);
  ctx.strokeStyle=`rgba(200,60,50,${t})`;ctx.setLineDash([6,5]);ctx.beginPath();ctx.moveTo(padL,baseY-(baseY-topY-10)*( (M/NB)/bmax ));ctx.lineTo(W-padR,baseY-(baseY-topY-10)*((M/NB)/bmax));ctx.stroke();ctx.setLineDash([]);
  // CDF curve (thin, black) mapped onto same box
  ctx.strokeStyle="rgba(0,0,0,0.55)";ctx.lineWidth=1.5;ctx.beginPath();
  for(let x=xmin,first=true;x<=xmax;x+=0.02){const y=baseY-cdf(x)*(baseY-topY-10);const px=X(x);if(first){ctx.moveTo(px,y);first=false;}else ctx.lineTo(px,y);}
  ctx.stroke();
  // sample dots
  ctx.fillStyle="#c0392b";
  for(const s of su){const pos=(1-t)*s.x+t*s.ux;ctx.beginPath();ctx.arc(X(pos),baseY+16,2.4,0,7);ctx.fill();}
  // axis
  ctx.strokeStyle="#ccc";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padL,baseY);ctx.lineTo(W-padR,baseY);ctx.stroke();
  ctx.fillStyle="#888";ctx.font="12px sans-serif";
  ctx.fillText(t<0.5?"data space  x":"uniform space  u = F(x)",padL,H-8);
}
let anim=null;
playBtn.onclick=()=>{if(anim){cancelAnimationFrame(anim);anim=null;playBtn.textContent="Play";return;}playBtn.textContent="Pause";let v=parseFloat(tEl.value);const step=()=>{v+=0.012;if(v>=1){v=1;tEl.value=v;draw();cancelAnimationFrame(anim);anim=null;playBtn.textContent="Play";return;}tEl.value=v;draw();anim=requestAnimationFrame(step);};anim=requestAnimationFrame(step);};
tEl.oninput=draw;
window.addEventListener('resize',()=>{fit();draw();});
fit();draw();
</script>
</body>
</html>
